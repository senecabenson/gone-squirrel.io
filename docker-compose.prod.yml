services:
  app:
    build:
      context: .
      target: production
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    expose:
      - "3000"
    networks:
      - default
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=root_default"
      - "traefik.http.routers.gonesquirrel.entrypoints=web,websecure"
      - "traefik.http.routers.gonesquirrel.rule=Host(`gonesquirrel.nilegrowthworks.com`)"
      - "traefik.http.routers.gonesquirrel.tls=true"
      - "traefik.http.routers.gonesquirrel.tls.certresolver=mytlschallenge"
      - "traefik.http.routers.gonesquirrel.middlewares=gonesquirrel@docker"
      - "traefik.http.services.gonesquirrel.loadbalancer.server.port=3000"
      - "traefik.http.middlewares.gonesquirrel.headers.SSLRedirect=true"
      - "traefik.http.middlewares.gonesquirrel.headers.SSLHost=nilegrowthworks.com"
      - "traefik.http.middlewares.gonesquirrel.headers.STSSeconds=315360000"
      - "traefik.http.middlewares.gonesquirrel.headers.STSIncludeSubdomains=true"
      - "traefik.http.middlewares.gonesquirrel.headers.STSPreload=true"
      - "traefik.http.middlewares.gonesquirrel.headers.forceSTSHeader=true"
      - "traefik.http.middlewares.gonesquirrel.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.gonesquirrel.headers.browserXSSFilter=true"

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - default

networks:
  default:
  traefik:
    external: true
    name: root_default

volumes:
  postgres_data:
